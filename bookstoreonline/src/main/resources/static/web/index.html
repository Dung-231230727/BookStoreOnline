<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhà Sách Online - Thế giới tri thức</title>

    <!-- 1. Bootstrap 5 Core -->
    <link rel="stylesheet" type="text/css" href="assets/lib/bootstrap/css/bootstrap.min.css">
    <!-- 2. Booksaw Vendor Styles -->
    <link rel="stylesheet" type="text/css" href="assets/css/vendor.css">
    <link rel="stylesheet" type="text/css" href="assets/fonts/icomoon/icomoon.css">
    <!-- 3. Booksaw Main Styles -->
    <link rel="stylesheet" type="text/css" href="assets/css/booksaw.css">
    <!-- 4. Project Special Overrides -->
    <link rel="stylesheet" type="text/css" href="assets/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <script src="assets/lib/jquery/jquery.min.js"></script>
    <script src="assets/js/vendor/modernizr.js"></script>
</head>

<body>
    <div id="header-area"></div>

    <div class="d-flex w-100">
        <!-- Sidebar cố định cho Admin (Chỉ hiện khi vào trang Admin) -->
        <div id="admin-sidebar-global" style="display: none;"></div>

        <!-- Vùng nạp nội dung chính -->
        <main id="render-body" class="flex-grow-1 p-0"></main>
    </div>

    <div id="footer-area"></div>

    <!-- AI Chat Support Widget (Person 5) -->
    <div id="chat-widget-container" style="position: fixed; bottom: 30px; right: 30px; z-index: 1050; display: flex; flex-direction: column; align-items: center;">
        
        <!-- Selection Bubbles -->
        <div id="chat-options-menu" style="display: none; flex-direction: column; gap: 12px; margin-bottom: 15px; align-items: center;">
            <div class="chat-bubble-opt" onclick="support.startStaffChat()" title="Gặp Nhân Viên" style="
                width: 50px; height: 50px; border-radius: 50%; background: #27ae60; color: white;
                display: flex; align-items: center; justify-content: center; cursor: pointer;
                box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                transform: translateY(20px); opacity: 0;
            " onmouseover="this.style.transform='translateY(0) scale(1.1)'" onmouseout="this.style.transform='translateY(0) scale(1)'">
                <span style="font-size: 1.2rem;">👨‍💼</span>
            </div>
            <div class="chat-bubble-opt" onclick="support.startAiChat()" title="Trò chuyện AI" style="
                width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #1A73E8, #9B72CB); color: white;
                display: flex; align-items: center; justify-content: center; cursor: pointer;
                box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                transform: translateY(20px); opacity: 0;
            " onmouseover="this.style.transform='translateY(0) scale(1.1)'" onmouseout="this.style.transform='translateY(0) scale(1)'">
                <span style="font-size: 1.2rem;">🤖</span>
            </div>
        </div>

        <!-- Main Button -->
        <button id="btn-main-chat" onclick="support.toggleChatMenu()"
            class="btn btn-accent rounded-circle shadow-lg p-0 d-flex align-items-center justify-content-center"
            style="width: 60px; height: 60px; border: none; position: relative; transition: all 0.3s ease;">
            <i class="icon icon-paper-plane fs-4 text-white" id="main-chat-icon"></i>
            <span id="close-chat-icon" style="display: none; font-size: 1.5rem; color: white;">✕</span>
            
            <!-- Global Notification Badge -->
            <span id="staff-notif-dot" style="
                display: none;
                position: absolute;
                top: -5px;
                right: -5px;
                min-width: 20px;
                height: 20px;
                padding: 0 5px;
                background: #e74c3c;
                color: white;
                border: 2px solid #fff;
                border-radius: 10px;
                box-shadow: 0 2px 10px rgba(231,76,60,0.4);
                z-index: 5;
                font-size: 11px;
                font-weight: 800;
                line-height: 16px;
                text-align: center;
            "></span>
        </button>

        <div id="chat-box-holder" style="display: none; position: absolute; bottom: 75px; right: 0; width: 350px;">
            <!-- Content will be loaded dynamically -->
        </div>
    </div>

    <style>
        /* Premium Floating & Entry Animations */
        .chat-bubble-show {
            transform: translateY(0) !important;
            opacity: 1 !important;
        }

        @keyframes bsw-float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes bsw-pulse {
            0% { box-shadow: 0 0 0 0 rgba(26, 115, 232, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(26, 115, 232, 0); }
            100% { box-shadow: 0 0 0 0 rgba(26, 115, 232, 0); }
        }

        .chat-bubble-opt {
            animation: bsw-float 4s ease-in-out infinite;
        }

        #btn-main-chat:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 10px 25px rgba(197, 169, 146, 0.4) !important;
        }

        #btn-main-chat:active {
            transform: scale(0.95);
        }

        /* Active bubble pulsing for new messages */
        .has-new-pulse {
            animation: bsw-float 3s ease-in-out infinite, bsw-pulse 2s infinite !important;
            border-color: #e74c3c !important;
        }
    </style>

    <!-- Global Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="appToast" class="toast border-0 shadow-lg rounded-4" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="toast-header bg-accent text-white border-0 rounded-top-4">
                <i class="icon icon-clipboard me-2"></i>
                <strong class="me-auto">Thông báo hệ thống</strong>
                <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
            <div class="toast-body bg-white rounded-bottom-4 fw-medium" id="toastMessage">
                <!-- Message injected here -->
            </div>
        </div>
    </div>

    <script src="assets/lib/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/vendor/plugins.js"></script>
    <script src="assets/js/vendor/script.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/modules/auth.js"></script>
    <script src="assets/js/modules/users.js"></script>
    <script src="assets/js/modules/books.js"></script>
    <script src="assets/js/modules/categories.js"></script>
    <script src="assets/js/modules/authors.js"></script>
    <script src="assets/js/modules/publishers.js"></script>
    <script src="assets/js/modules/cart.js"></script>
    <script src="assets/js/modules/orders.js"></script>
    <script src="assets/js/modules/inventory.js"></script>
    <script src="assets/js/modules/suppliers.js"></script>
    <script src="assets/js/modules/vouchers.js"></script>
    <script src="assets/js/modules/review.js"></script>
    <script src="assets/js/modules/support.js"></script>
    <script src="assets/js/modules/shipping.js"></script>
    <script src="assets/js/modules/payments.js"></script>
    <script src="assets/js/modules/auditlog.js"></script>
    <script src="assets/js/admin/dashboard.js"></script>
    <script src="assets/js/layout-manager.js"></script>

    <script>
        $(document).ready(() => {
            // Khởi chạy hệ thống layout, nạp trang chủ mặc định
            layout.render('', 'Home/Index');
        });
    </script>
</body>

</html>
