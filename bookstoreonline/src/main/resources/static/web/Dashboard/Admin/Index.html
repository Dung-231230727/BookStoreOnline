<!-- Admin Dashboard View -->
<div class="p-4 p-md-5 w-100">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold font-serif mb-1">Bảng điều khiển</h2>
            <p class="text-muted mb-0 small">Thống kê tổng quan hệ thống nhà sách</p>
        </div>
        <div class="avatar-placeholder rounded-circle bg-accent text-white d-flex align-items-center justify-content-center fw-bold" style="width:44px;height:44px;font-size:1.2rem">A</div>
    </div>

    <!-- KPI Stats Row -->
    <div class="row g-4 mb-5">
        <div class="col-6 col-lg-3">
            <div class="card border-0 shadow-sm rounded-5 p-4 bg-white h-100">
                <span class="text-muted small text-uppercase fw-bold mb-2 d-block">Doanh thu</span>
                <h3 class="display-6 fw-bold text-accent" id="stat-revenue">---</h3>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card border-0 shadow-sm rounded-5 p-4 bg-white h-100">
                <span class="text-muted small text-uppercase fw-bold mb-2 d-block">Đơn hàng</span>
                <h3 class="display-6 fw-bold text-accent" id="stat-orders">---</h3>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card border-0 shadow-sm rounded-5 p-4 bg-white h-100">
                <span class="text-muted small text-uppercase fw-bold mb-2 d-block">Đầu sách</span>
                <h3 class="display-6 fw-bold text-accent" id="stat-books">---</h3>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="card border-0 shadow-sm rounded-5 p-4 bg-white h-100">
                <span class="text-muted small text-uppercase fw-bold mb-2 d-block">Khách hàng</span>
                <h3 class="display-6 fw-bold text-accent" id="stat-customers">---</h3>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Top Selling Books -->
        <div class="col-lg-5">
            <div class="card border-0 shadow-sm rounded-5 p-4 bg-white h-100">
                <h5 class="fw-bold font-serif mb-4">🏆 Top sách bán chạy</h5>
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="text-muted small">
                            <tr><th class="ps-3">Hạng</th><th>Tên sách</th><th class="text-end pe-3">Đã bán</th></tr>
                        </thead>
                        <tbody id="ranking-list">
                            <tr><td colspan="3" class="text-center py-3">
                                <div class="spinner-border spinner-border-sm text-accent"></div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Audit Log -->
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm rounded-5 p-4 bg-white h-100">
                <h5 class="fw-bold font-serif mb-4">📋 Nhật ký hoạt động</h5>
                <div class="table-responsive" style="max-height: 380px; overflow-y: auto;">
                    <table class="table align-middle mb-0 small">
                        <thead class="text-muted">
                            <tr><th class="ps-3">Người dùng</th><th>Hành động</th><th class="text-end pe-3">Thời gian</th></tr>
                        </thead>
                        <tbody id="audit-log-list">
                            <tr><td colspan="3" class="text-center py-3">
                                <div class="spinner-border spinner-border-sm text-accent"></div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

    .hvr-admin:hover { transform: translateX(5px); color: white !important; background: rgba(255,255,255,0.05); }
    .nav-link.active-admin { color: white !important; font-weight: bold; }
