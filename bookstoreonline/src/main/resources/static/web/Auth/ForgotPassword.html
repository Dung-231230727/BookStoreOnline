<div class="container-fluid h-100">
    <div class="row h-100">
        <div class="col-12 d-flex align-items-center justify-content-center" style="min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <div class="card shadow-lg" style="width: 100%; max-width: 450px; border-radius: 15px; border: none;">
                
                <!-- Header -->
                <div class="card-header bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 15px 15px 0 0; padding: 30px 20px;">
                    <h2 class="text-center mb-2" style="font-weight: 600;">Quên Mật Khẩu?</h2>
                    <p class="text-center small mb-0">Nhập email của bạn để nhận hướng dẫn đặt lại</p>
                </div>

                <!-- Body -->
                <div class="card-body p-4">
                    
                    <!-- Alert Container -->
                    <div id="alertContainer"></div>

                    <!-- Form -->
                    <form id="forgotPasswordForm">
                        
                        <!-- Email Input -->
                        <div class="form-group mb-3">
                            <label for="email" class="form-label fw-600 text-dark">
                                <i class="fas fa-envelope me-2"></i>Email Đăng Ký
                            </label>
                            <input 
                                type="email" 
                                class="form-control form-control-lg" 
                                id="email" 
                                name="email" 
                                placeholder="Nhập email của bạn..."
                                required
                                style="border-radius: 8px; border: 1px solid #ddd; padding: 12px 15px; font-size: 14px;">
                            <small class="text-muted d-block mt-2">
                                <i class="fas fa-info-circle"></i> Chúng tôi sẽ gửi liên kết đặt lại mật khẩu trong 5 phút
                            </small>
                        </div>

                        <!-- Submit Button -->
                        <button 
                            type="submit" 
                            id="submitBtn"
                            class="btn btn-gradient w-100 py-2 fw-600" 
                            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; transition: all 0.3s ease;">
                            <i class="fas fa-paper-plane me-2"></i>Gửi Hướng Dẫn Đặt Lại
                        </button>

                        <!-- Cancel Button -->
                        <button 
                            type="button" 
                            class="btn btn-light w-100 py-2 fw-600 mt-2" 
                            onclick="layout.render('Auth', 'Login')"
                            style="border-radius: 8px; border: 1px solid #ddd; color: #333;">
                            <i class="fas fa-arrow-left me-2"></i>Quay Lại Đăng Nhập
                        </button>
                    </form>

                    <hr class="my-4">

                    <!-- Help Text -->
                    <div class="text-center small">
                        <p class="text-muted mb-0">
                            <i class="fas fa-headset text-info me-1"></i>
                            <a href="javascript:layout.render('Support', 'Index')" class="text-decoration-none text-info">Liên hệ hỗ trợ</a> 
                            nếu bạn cần giúp đỡ
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-gradient:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
    }

    .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    }

    .form-label {
        font-size: 14px;
        color: #333;
    }
</style>

<script>
    $(document).ready(function() {
        $("#header-area, #footer-area").hide();

        // Form submission
        $("#forgotPasswordForm").on("submit", function(e) {
            e.preventDefault();

            const email = $("#email").val().trim();
            const submitBtn = $("#submitBtn");
            const alertContainer = $("#alertContainer");

            // Validation
            if (!email) {
                showAlert("danger", "Vui lòng nhập email của bạn", alertContainer);
                return;
            }

            // Show loading
            submitBtn.prop("disabled", true);
            submitBtn.html('<i class="fas fa-spinner fa-spin me-2"></i>Đang gửi...');

            // API call
            api.post("/auth/forgot-password", { email: email })
                .done(function(response) {
                    if (response.status === 200) {
                        showAlert("success", "✓ " + response.message, alertContainer);
                        
                        // Clear form
                        $("#forgotPasswordForm")[0].reset();

                        // Redirect to login after 3 seconds
                        setTimeout(function() {
                            layout.render("Auth", "Login");
                        }, 3000);
                    } else {
                        showAlert("danger", response.message || "Có lỗi xảy ra. Vui lòng thử lại.", alertContainer);
                    }
                })
                .fail(function(jqXHR) {
                    const errorMsg = jqXHR.responseJSON?.message || "Email không tồn tại hoặc không hợp lệ";
                    showAlert("danger", errorMsg, alertContainer);
                })
                .always(function() {
                    submitBtn.prop("disabled", false);
                    submitBtn.html('<i class="fas fa-paper-plane me-2"></i>Gửi Hướng Dẫn Đặt Lại');
                });
        });

        // Alert helper
        function showAlert(type, message, container) {
            const alertHTML = `
                <div class="alert alert-${type === 'danger' ? 'danger' : type} alert-dismissible fade show" role="alert">
                    <i class="fas fa-${type === 'danger' ? 'exclamation-circle' : 'check-circle'} me-2"></i>${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            container.html(alertHTML);
            container.scrollTop();
        }
    });
</script>
