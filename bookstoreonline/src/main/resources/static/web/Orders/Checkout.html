<div class="checkout-page bg-light py-5">
    <div class="container">
        <div class="row g-5">
            <!-- Left: Shipping Information -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h4 class="fw-bold mb-4"><i class="icon icon-truck me-2 text-accent"></i> Thông tin giao hàng</h4>
                    <form id="checkout-form">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Họ và tên</label>
                                <input type="text" class="form-control rounded-pill border-light bg-light py-2 px-3" id="customer-name" name="hoTen" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-muted">Số điện thoại</label>
                                <input type="tel" class="form-control rounded-pill border-light bg-light py-2 px-3" id="customer-phone" name="soDienThoai" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small text-muted">Email</label>
                                <input type="email" class="form-control rounded-pill border-light bg-light py-2 px-3" id="customer-email" name="email" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label small text-muted">Địa chỉ nhận hàng</label>
                                <textarea class="form-control rounded-4 border-light bg-light py-2 px-3" id="customer-address" name="diaChi" rows="3" required></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label small text-muted">Ghi chú đơn hàng (Tùy chọn)</label>
                                <textarea class="form-control rounded-4 border-light bg-light py-2 px-3" id="order-note" name="ghiChu" rows="2" placeholder="Ví dụ: Giao giờ hành chính..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h4 class="fw-bold mb-4"><i class="icon icon-credit-card me-2 text-accent"></i> Phương thức thanh toán</h4>
                    <div class="payment-methods">
                        <label class="payment-option d-flex align-items-center p-3 border rounded-3 mb-3 cursor-pointer transition-all hvr-light">
                            <input type="radio" name="paymentMethod" value="COD" checked class="form-check-input me-3">
                            <div class="d-flex align-items-center gap-3">
                                <div class="icon-box bg-primary-subtle text-primary p-2 rounded">
                                    <i class="icon icon-truck fs-4"></i>
                                </div>
                                <div>
                                    <div class="fw-bold">Thanh toán khi nhận hàng (COD)</div>
                                    <small class="text-muted">Giao hàng và thu tiền tận nơi</small>
                                </div>
                            </div>
                        </label>

                        <label class="payment-option d-flex align-items-center p-3 border rounded-3 mb-3 cursor-pointer transition-all hvr-light">
                            <input type="radio" name="paymentMethod" value="VNPAY" class="form-check-input me-3">
                            <div class="d-flex align-items-center gap-3">
                                <div class="icon-box bg-info-subtle text-info p-2 rounded">
                                    <img src="https://vnpay.vn/wp-content/themes/vnpay/assets/images/logo-vnpay.png" alt="VNPay" width="24">
                                </div>
                                <div>
                                    <div class="fw-bold">Thanh toán qua cổng VNPay</div>
                                    <small class="text-muted">Hỗ trợ ATM, Thẻ quốc tế, QR-Code</small>
                                </div>
                            </div>
                        </label>

                        <label class="payment-option d-flex align-items-center p-3 border rounded-3 cursor-pointer transition-all hvr-light">
                            <input type="radio" name="paymentMethod" value="MOMO" class="form-check-input me-3">
                            <div class="d-flex align-items-center gap-3">
                                <div class="icon-box bg-warning-subtle text-warning p-2 rounded">
                                    <i class="icon icon-wallet fs-4"></i>
                                </div>
                                <div>
                                    <div class="fw-bold">Thanh toán qua ví MOMO</div>
                                    <small class="text-muted">Ví điện tử MOMO nhanh chóng, an toàn</small>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-4 mt-4">
                    <h4 class="fw-bold mb-4"><i class="icon icon-gift me-2 text-accent"></i> Mã giảm giá</h4>
                    <div class="d-flex gap-2">
                        <input type="text" class="form-control rounded-pill border-light bg-light py-2 px-3" id="voucher-input" placeholder="Nhập mã giảm giá (tùy chọn)">
                        <button type="button" class="btn btn-outline-accent rounded-pill px-4 fw-bold" id="btn-apply-voucher">
                            <i class="icon icon-check me-2"></i>Áp dụng
                        </button>
                    </div>
                    <div id="voucher-message" class="mt-3 small" style="display:none;"></div>
                </div>
            </div>
            </div>

            <!-- Right: Order Summary -->
            <div class="col-lg-4">
                <div class="card border-0 shadow px-4 py-4 rounded-4 sticky-top" style="top: 100px;">
                    <h5 class="fw-bold mb-4">Tóm tắt đơn hàng</h5>
                    <div id="checkout-summary" class="mb-4">
                        <!-- Items rendered dynamically -->
                        <div class="text-center py-3">
                            <div class="spinner-border spinner-border-sm text-accent" role="status"></div>
                        </div>
                    </div>
                    
                    <div class="border-top pt-3">
                        <div class="d-flex justify-content-between mb-2">
                            <span>Tạm tính</span>
                            <span id="summary-subtotal">0 đ</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Phí vận chuyển</span>
                            <span id="summary-shipping">0 đ</span>
                        </div>
                        <div class="d-flex justify-content-between mb-4 pt-3 border-top">
                            <h5 class="fw-bold">Tổng cộng</h5>
                            <h5 class="fw-bold text-accent" id="summary-total">0 đ</h5>
                        </div>
                        <button id="btn-place-order" class="btn btn-accent btn-lg w-100 rounded-pill py-3 fw-bold shadow-sm">
                            ĐẶT HÀNG NGAY <i class="icon icon-arrow-right ms-2"></i>
                        </button>
                        <p class="text-center mt-3 small text-muted">Bằng việc đặt hàng, bạn đồng ý với các điều khoản của Booksaw.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.payment-option:hover { border-color: var(--accent-color) !important; background-color: #fff9f5; }
.payment-option input:checked + div { color: var(--accent-color); }
</style>
