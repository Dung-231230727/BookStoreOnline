<div class="order-history-page py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-1">Lịch sử đơn hàng</h2>
                <p class="text-muted">Theo dõi và quản lý các đơn hàng bạn đã đặt tại Booksaw</p>
            </div>
            <button class="btn btn-outline-accent rounded-pill px-4" onclick="layout.render('', 'Home/Index')">
                <i class="icon icon-plus me-2"></i> Mua thêm sách
            </button>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4 py-3 text-muted small text-uppercase fw-bold">Mã đơn</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold">Ngày đặt</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold">Tổng tiền</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold">Thanh toán</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold">Trạng thái</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="order-history-list" class="border-top-0">
                        <!-- Items rendered dynamically from orders.js -->
                        <tr>
                            <td colspan="6" class="text-center py-5">
                                <div class="spinner-border text-accent spinner-border-sm" role="status"></div>
                                <span class="ms-2 text-muted">Đang tải lịch sử...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
