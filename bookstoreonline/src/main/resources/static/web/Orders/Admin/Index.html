<div class="admin-orders-page p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-1">Quản lý Đơn hàng</h3>
            <p class="text-muted small mb-0">Theo dõi doanh thu và trạng thái vận chuyển</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-light rounded-pill px-3 shadow-sm" onclick="orders.loadAdminOrders()">
                <i class="icon icon-refresh"></i> Làm mới
            </button>
            <div class="dropdown">
                <button class="btn btn-accent rounded-pill px-3 shadow-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    Xuất báo cáo
                </button>
                <ul class="dropdown-menu border-0 shadow-sm dropdown-menu-end">
                    <li><a class="dropdown-item" href="#">Xuất Excel (.xlsx)</a></li>
                    <li><a class="dropdown-item" href="#">In danh sách PDF</a></li>
                </ul>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-4 p-3 bg-white">
                <div class="text-muted small mb-1">Đơn mới hôm nay</div>
                <div class="h4 fw-bold mb-0">12</div>
                <div class="text-success small"><i class="icon icon-arrow-up"></i> +15%</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-4 p-3 bg-white">
                <div class="text-muted small mb-1">Chờ xử lý</div>
                <div class="h4 fw-bold mb-0 text-warning">08</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-4 p-3 bg-white">
                <div class="text-muted small mb-1">Đã giao hoàn tất</div>
                <div class="h4 fw-bold mb-0 text-success">145</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm rounded-4 p-3 bg-white">
                <div class="text-muted small mb-1">Doanh thu tháng</div>
                <div class="h4 fw-bold mb-0 text-accent">12.5tr</div>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4 py-3 text-muted small text-uppercase fw-bold">ID Đơn</th>
                        <th class="py-3 text-muted small text-uppercase fw-bold">Khách hàng</th>
                        <th class="py-3 text-muted small text-uppercase fw-bold">Ngày đặt</th>
                        <th class="py-3 text-muted small text-uppercase fw-bold">Tổng tiền</th>
                        <th class="py-3 text-muted small text-uppercase fw-bold">Trạng thái</th>
                        <th class="py-3 text-muted small text-uppercase fw-bold text-end pe-4">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="orders-admin-list">
                    <!-- Data populated from orders.js -->
                </tbody>
            </table>
        </div>
    </div>
</div>
