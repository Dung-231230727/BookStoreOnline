<div class="shipping-tracking-page py-5 bg-light min-vh-100">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8 text-center mb-5">
                <h1 class="font-serif fw-bold display-5 mb-3">Tra cứu Vận đơn trực tuyến</h1>
                <p class="text-muted">Nhập mã đơn hàng để theo dõi hành trình giao hàng từ Kho đến bạn.</p>
                
                <div class="bg-white p-2 rounded-pill shadow-sm d-flex align-items-center mt-4">
                    <i class="icon icon-search ms-3 text-muted"></i>
                    <input type="text" id="tracking-input-id" class="form-control border-0 bg-transparent shadow-none" placeholder="VD: ORD-001..." onkeyup="if(event.key === 'Enter') orders.trackOrder($('#tracking-input-id').val())">
                    <button class="btn btn-accent rounded-pill px-4 fw-bold" onclick="orders.trackOrder($('#tracking-input-id').val())">TRA CỨU</button>
                </div>
            </div>
        </div>

        <div class="row justify-content-center" id="tracking-result-container" style="display:none;">
            <div class="col-lg-8">
                <div class="card border-0 shadow-lg rounded-5 bg-white p-4 p-md-5">
                    <div class="d-flex flex-wrap justify-content-between border-bottom pb-4 mb-5">
                        <div>
                            <h5 class="fw-bold text-dark mb-1" id="tracking-display-id">---</h5>
                            <p class="text-muted small mb-0">Nhà vận chuyển: <span class="fw-bold text-accent" id="tracking-carrier">Giao Hàng Nhanh (GHN)</span></p>
                        </div>
                        <div class="text-end mt-3 mt-md-0">
                            <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-pill fw-bold border border-primary border-opacity-25" id="tracking-status-badge">Đang xử lý</span>
                        </div>
                    </div>

                    <h6 class="fw-bold mb-4"><i class="icon icon-map-pin me-2 text-accent"></i>Lịch sử vận chuyển</h6>
                    <div id="tracking-timeline" class="ps-3 pt-2">
                        <!-- Dynamic generated timeline -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.tracking-step { min-height: 80px; position: relative; padding-left: 30px; }
.tracking-step:before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: #ddd; }
.tracking-step:first-child:before { top: 10px; }
.tracking-step:last-child:before { display: none; }
.tracking-step-dot { position: absolute; left: -8px; top: 5px; width: 16px; height: 16px; border-radius: 50%; background: white; border: 3px solid #ddd; }
.tracking-step.active .tracking-step-dot { background: var(--accent-color); border-color: var(--accent-color); }
</style>

<script>
(() => {
    const trackingId = common.getQueryParam('id');
    if (trackingId) {
        setTimeout(() => orders.trackOrder(trackingId), 500);
    }
})();
</script>
