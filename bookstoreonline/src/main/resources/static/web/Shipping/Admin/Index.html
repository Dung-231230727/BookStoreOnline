<div class="p-4 p-md-5 w-100">

    <main class="flex-grow-1 p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('Dashboard/Admin', 'Index')" class="text-decoration-none text-muted">Admin</a></li>
                        <li class="breadcrumb-item small active fw-bold text-accent">Quản lý Vận chuyển</li>
                    </ol>
                </nav>
                <h2 class="fw-bold font-serif mb-0">Quản lý Vận chuyển & Logistics</h2>
            </div>
        </div>

        <!-- Filter & Search -->
        <div class="row mb-4 gap-3">
            <div class="col-md-3">
                <input type="text" class="form-control rounded-3 border-0 bg-light" id="shipping-search" placeholder="Tìm kiếm mã vận chuyển...">
            </div>
            <div class="col-md-2">
                <select class="form-select rounded-3 border-0 bg-light" id="shipping-status-filter">
                    <option value="">-- Tất cả trạng thái --</option>
                    <option value="PENDING">Chờ xác nhận</option>
                    <option value="IN_TRANSIT">Đang giao</option>
                    <option value="DELIVERED">Đã giao</option>
                    <option value="RETURNED">Trả lại</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select rounded-3 border-0 bg-light" id="shipping-carrier-filter">
                    <option value="">-- Nhà vận chuyển --</option>
                    <option value="GHN">Giao Hàng Nhanh</option>
                    <option value="VIETTEL">Viettel Post</option>
                    <option value="JNEX">J&T Express</option>
                    <option value="OTHER">Khác</option>
                </select>
            </div>
            <div class="col-md-auto">
                <button class="btn btn-accent rounded-3 px-4 py-2 fw-bold" onclick="shipping.loadAdminShipments()">
                    <i class="icon icon-search me-2"></i>Tìm kiếm
                </button>
            </div>
        </div>

        <!-- Shipments Table -->
        <div class="card border-0 shadow-sm rounded-5 overflow-hidden bg-white">
            <div class="table-responsive">
                <table class="table align-middle table-hover mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Mã VĐ</th>
                            <th>Mã đơn hàng</th>
                            <th>Địa chỉ giao</th>
                            <th>Nhà vận chuyển</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th class="text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="shipping-list-body">
                        <tr>
                            <td colspan="7" class="text-center py-5">
                                <div class="spinner-border text-accent spinner-border-sm" role="status"></div>
                                <span class="ms-2 text-muted">Đang tải...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    $("#header-area, #footer-area").hide();
    
    $(document).ready(function() {
        shipping.loadAdminShipments();
        
        $("#shipping-search, #shipping-status-filter, #shipping-carrier-filter").on("change keyup", function() {
            shipping.loadAdminShipments();
        });
    });
</script>
