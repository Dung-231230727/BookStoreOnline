<div class="admin-suppliers-page p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-1">Partners & Suppliers Management</h3>
            <p class="text-muted small mb-0">Registry of publishers and distributors for inventory fulfillment</p>
        </div>
        <button class="btn btn-accent rounded-pill px-4 shadow-sm" onclick="suppliers.addSupplier()">
            <i class="icon icon-plus me-2"></i> Add New Partner
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light text-muted extra-small text-uppercase fw-bold border-0">
                    <tr>
                        <th class="ps-4 py-3">Partner Name</th>
                        <th class="py-3">Tax Code</th>
                        <th class="py-3">Contact Number</th>
                        <th class="py-3 text-end pe-4">Operations</th>
                    </tr>
                </thead>
                <tbody id="suppliers-list">
                    <tr>
                         <td colspan="4" class="text-center py-5 text-muted">
                            <div class="spinner-border spinner-border-sm text-accent mb-2"></div><br>Syncing partner registry...
                         </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
