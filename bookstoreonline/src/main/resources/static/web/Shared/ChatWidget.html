<!-- Booksaw AI Chat Widget -->
<div id="bsw-chat" style="
    width: 360px;
    height: 520px;
    display: flex;
    flex-direction: column;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: #fff;
">
    <!-- Header -->
    <div style="
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
    ">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="
                width: 38px; height: 38px;
                background: linear-gradient(135deg, #C5A992, #a8866e);
                border-radius: 50%;
                display: flex; align-items: center; justify-content: center;
                font-size: 1rem;
            ">📚</div>
            <div>
                <div style="color:#fff; font-weight:700; font-size:0.88rem; line-height:1.2;">Booksaw AI</div>
                <div style="display:flex; align-items:center; gap:5px; margin-top:2px;">
                    <span style="width:7px; height:7px; background:#4ade80; border-radius:50%; display:inline-block;"></span>
                    <span style="color:rgba(255,255,255,0.55); font-size:0.68rem;">Trực tuyến · Phản hồi ngay</span>
                </div>
            </div>
        </div>
        <button onclick="$('#chat-box-holder').fadeOut(200)" style="
            background: rgba(255,255,255,0.1);
            border: none; border-radius: 50%;
            width: 30px; height: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        " onmouseover="this.style.background='rgba(255,255,255,0.2)'"
           onmouseout="this.style.background='rgba(255,255,255,0.1)'">✕</button>
    </div>

    <!-- Messages -->
    <div id="chat-box" style="
        flex: 1;
        overflow-y: auto;
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #f8f6f3;
    ">
        <!-- Welcome message -->
        <div style="display:flex; gap:8px; align-items:flex-start;">
            <div style="width:28px;height:28px;background:linear-gradient(135deg,#C5A992,#a8866e);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;flex-shrink:0;">📚</div>
            <div style="
                background: #fff;
                border-radius: 4px 16px 16px 16px;
                padding: 10px 13px;
                max-width: 82%;
                font-size: 0.82rem;
                line-height: 1.55;
                color: #1a1a1a;
                box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            ">
                👋 Chào bạn! Tôi là <strong>Booksaw AI</strong>.<br>
                Tôi có thể giúp bạn tìm sách, tư vấn, kiểm tra đơn hàng và nhiều hơn nữa!
            </div>
        </div>
        <!-- Quick start chips -->
        <div style="display:flex; flex-wrap:wrap; gap:6px; padding-left:36px;">
            <button class="bsw-chip" data-msg="Tư vấn sách hay cho tôi" onclick="support.sendChat(this.dataset.msg)">📚 Tư vấn sách</button>
            <button class="bsw-chip" data-msg="Đơn hàng của tôi đâu" onclick="support.sendChat(this.dataset.msg)">📦 Đơn hàng</button>
            <button class="bsw-chip" data-msg="Có mã giảm giá không" onclick="support.sendChat(this.dataset.msg)">🎁 Voucher</button>
            <button class="bsw-chip" data-msg="Chính sách đổi trả" onclick="support.sendChat(this.dataset.msg)">🔄 Đổi trả</button>
        </div>
    </div>

    <!-- Input -->
    <div style="
        padding: 10px 12px;
        background: #fff;
        border-top: 1px solid #f0ede8;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
    ">
        <input type="text" id="chat-user-msg" placeholder="Nhập câu hỏi..." style="
            flex: 1;
            border: 1.5px solid #e8e4dc;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 0.82rem;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
            background: #fafaf8;
            color: #1a1a1a;
        " onfocus="this.style.borderColor='#C5A992'"
           onblur="this.style.borderColor='#e8e4dc'"
           onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();support.sendChatFromInput();}">
        <button onclick="support.sendChatFromInput()" style="
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #C5A992, #a8866e);
            border: none; border-radius: 50%;
            color: #fff; font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, opacity 0.15s;
        " onmouseover="this.style.transform='scale(1.08)'"
           onmouseout="this.style.transform='scale(1)'">➤</button>
    </div>
</div>

<style>
#chat-box::-webkit-scrollbar { width: 4px; }
#chat-box::-webkit-scrollbar-thumb { background: #C5A992; border-radius: 10px; }
#chat-box::-webkit-scrollbar-track { background: transparent; }

.bsw-chip {
    background: #fff;
    border: 1.5px solid #e8e4dc;
    border-radius: 20px;
    padding: 4px 11px;
    font-size: 0.73rem;
    color: #555;
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
    white-space: nowrap;
}
.bsw-chip:hover {
    background: #C5A992;
    border-color: #C5A992;
    color: #fff;
}

.bsw-msg-ai {
    display: flex;
    gap: 8px;
    align-items: flex-start;
}
.bsw-msg-ai .bsw-bubble {
    background: #fff;
    border-radius: 4px 16px 16px 16px;
    padding: 10px 13px;
    max-width: 82%;
    font-size: 0.82rem;
    line-height: 1.6;
    color: #1a1a1a;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    white-space: pre-line;
}
.bsw-msg-user {
    display: flex;
    justify-content: flex-end;
}
.bsw-msg-user .bsw-bubble {
    background: linear-gradient(135deg, #C5A992, #a8866e);
    color: #fff;
    border-radius: 16px 4px 16px 16px;
    padding: 9px 13px;
    max-width: 78%;
    font-size: 0.82rem;
    line-height: 1.5;
}
.bsw-avatar {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #C5A992, #a8866e);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
}
.bsw-quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding-left: 36px;
    margin-top: 2px;
}
</style>
