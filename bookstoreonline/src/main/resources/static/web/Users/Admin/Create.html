<!-- Users/Admin/Create.html - Create Staff/Admin Account -->
<div class="p-4 p-md-5 w-100">
    <div class="d-flex align-items-center gap-3 mb-5">
        <button onclick="layout.render('Users', 'Admin/Index')" class="btn btn-light rounded-circle p-2">
            <i class="icon icon-arrow-left"></i>
        </button>
        <div>
            <h2 class="fw-bold font-serif mb-0">Tạo tài khoản mới</h2>
            <p class="text-muted mb-0 small">Thêm nhân viên hoặc quản trị viên vào hệ thống</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm rounded-5 p-5">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-bold text-muted small text-uppercase">Tên đăng nhập <span class="text-danger">*</span></label>
                        <input type="text" id="new-username" class="form-control form-control-lg rounded-4" placeholder="VD: nhanvien01">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold text-muted small text-uppercase">Mật khẩu <span class="text-danger">*</span></label>
                        <input type="password" id="new-password" class="form-control form-control-lg rounded-4" placeholder="Tối thiểu 6 ký tự">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold text-muted small text-uppercase">Quyền hạn <span class="text-danger">*</span></label>
                        <select id="new-role" class="form-select form-select-lg rounded-4">
                            <option value="">-- Chọn quyền --</option>
                            <option value="STAFF">STAFF - Nhân viên bán hàng</option>
                            <option value="STOREKEEPER">STOREKEEPER - Thủ kho</option>
                            <option value="ADMIN">ADMIN - Quản trị viên</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small text-uppercase">Họ và tên</label>
                        <input type="text" id="new-hoten" class="form-control rounded-4" placeholder="Nhập họ tên...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-muted small text-uppercase">Số điện thoại</label>
                        <input type="tel" id="new-sdt" class="form-control rounded-4" placeholder="Nhập SĐT...">
                    </div>
                </div>

                <div class="mt-5 d-flex gap-3">
                    <button onclick="users.adminCreate()" class="btn btn-accent btn-lg rounded-pill px-5 fw-bold flex-grow-1">
                        <i class="icon icon-user me-2"></i> Tạo tài khoản
                    </button>
                    <button onclick="layout.render('Users', 'Admin/Index')" class="btn btn-light btn-lg rounded-pill px-4">
                        Hủy
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-accent { background-color: #C5A992; color: white; border: none; }
    .btn-accent:hover { background-color: #2F2F2F; transform: translateY(-2px); }
</style>
