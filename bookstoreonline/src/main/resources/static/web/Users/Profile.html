<!-- Users/Profile.html - Customer & Staff Profile Page -->
<div class="profile-page py-5">
    <div class="container" style="max-width: 760px;">
        <div class="mb-5">
            <h2 class="fw-bold font-serif">Hồ sơ cá nhân</h2>
            <p class="text-muted">Quản lý thông tin tài khoản và bảo mật</p>
        </div>

        <!-- Profile Info Card -->
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
            <h5 class="fw-bold mb-4 d-flex align-items-center gap-2">
                <i class="icon icon-user text-accent"></i> Thông tin cá nhân
            </h5>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label text-muted small fw-bold">Tên đăng nhập</label>
                    <input type="text" id="profile-username" class="form-control rounded-4 bg-light" readonly>
                </div>
                <div class="col-12">
                    <label class="form-label text-muted small fw-bold">Quyền hạn</label>
                    <input type="text" id="profile-role" class="form-control rounded-4 bg-light" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold">Họ và tên</label>
                    <input type="text" id="profile-hoten" class="form-control rounded-4" placeholder="Nhập họ tên...">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold">Số điện thoại</label>
                    <input type="tel" id="profile-sdt" class="form-control rounded-4" placeholder="Nhập SĐT...">
                </div>
                <div class="col-12" id="profile-address-row">
                    <label class="form-label text-muted small fw-bold">Địa chỉ giao hàng</label>
                    <input type="text" id="profile-diachi" class="form-control rounded-4" placeholder="Nhập địa chỉ...">
                </div>
            </div>
            <div class="mt-4 text-end">
                <button onclick="users.updateProfile()" class="btn btn-accent rounded-pill px-5 py-2 fw-bold">
                    Lưu thay đổi
                </button>
            </div>
        </div>

        <!-- Change Password Card -->
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h5 class="fw-bold mb-4 d-flex align-items-center gap-2">
                <i class="icon icon-lock text-accent"></i> Đổi mật khẩu
            </h5>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label text-muted small fw-bold">Mật khẩu hiện tại</label>
                    <input type="password" id="pw-old" class="form-control rounded-4" placeholder="Nhập mật khẩu cũ...">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold">Mật khẩu mới</label>
                    <input type="password" id="pw-new" class="form-control rounded-4" placeholder="Tối thiểu 6 ký tự">
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted small fw-bold">Xác nhận mật khẩu mới</label>
                    <input type="password" id="pw-confirm" class="form-control rounded-4" placeholder="Nhập lại mật khẩu mới">
                </div>
            </div>
            <div class="mt-4 text-end">
                <button onclick="users.changePassword()" class="btn btn-outline-danger rounded-pill px-5 py-2 fw-bold">
                    Đổi mật khẩu
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const user = api.getUser();
        if (user && user.role !== 'CUSTOMER') {
            $('#profile-address-row').hide();
        }
        users.loadProfile();
    })();
</script>

<style>
    .btn-accent { background-color: #C5A992; color: white; border: none; }
    .btn-accent:hover { background-color: #2F2F2F; }
</style>
