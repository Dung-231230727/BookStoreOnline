<!-- Admin Books - Edit Product -->
<div class="p-4 p-md-5 w-100 bg-light min-vh-100">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2">
                    <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('Books', 'Admin/Index')" class="text-decoration-none text-muted">Quản lý sách</a></li>
                    <li class="breadcrumb-item small active fw-bold text-accent">Chỉnh sửa</li>
                </ol>
            </nav>
            <h2 class="fw-bold font-serif mb-0 text-dark">Chỉnh sửa thông tin sách</h2>
        </div>
        <div class="d-flex gap-2">
            <button onclick="layout.render('Books', 'Admin/Index')" class="btn btn-outline-dark rounded-pill px-4">Hủy</button>
            <button id="btn-update-book" class="btn btn-accent rounded-pill px-4 fw-bold shadow-sm">Cập nhật</button>
        </div>
    </div>

    <form id="edit-book-form">
        <div class="row g-4">
            <!-- Left: Main Info -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Thông tin cơ bản</h5>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold">Tên sách <span class="text-danger">*</span></label>
                            <input type="text" name="tenSach" id="edit-tenSach" class="form-control rounded-pill px-3" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Mã ISBN (không thể đổi)</label>
                            <input type="text" id="edit-isbn-display" class="form-control rounded-pill px-3 bg-light" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Danh mục</label>
                            <select name="maDanhMuc" id="maDanhMuc" class="form-select rounded-pill px-3">
                                <option value="">-- Đang tải... --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Nhà xuất bản</label>
                            <select name="maNxb" id="maNxb" class="form-select rounded-pill px-3">
                                <option value="">-- Đang tải... --</option>
                            </select>
                        </div>
                        <!-- soTrang field removed to match Database Schema -->
                        <div class="col-12">
                            <label class="form-label small fw-bold">Mô tả sản phẩm</label>
                            <textarea name="moTa" id="edit-moTa" class="form-control rounded-4 px-3" rows="5"></textarea>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Thông số kỹ thuật</h5>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Trọng lượng (g)</label>
                            <input type="number" name="trongLuong" id="edit-trongLuong" class="form-control rounded-pill">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Năm xuất bản</label>
                            <input type="number" name="namXuatBan" id="edit-namXuatBan" class="form-control rounded-pill">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Ngôn ngữ</label>
                            <select name="ngonNgu" id="edit-ngonNgu" class="form-select rounded-pill">
                                <option value="Tiếng Việt">Tiếng Việt</option>
                                <option value="Tiếng Anh">Tiếng Anh</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Pricing & Image -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Giá niêm yết</h5>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Giá (VNĐ) <span class="text-danger">*</span></label>
                        <input type="number" name="giaNiemYet" id="edit-giaNiemYet"
                            class="form-control rounded-pill fw-bold" required min="1000"
                            oninput="document.getElementById('edit-price-display').innerText = api.formatCurrency(this.value || 0)">
                    </div>
                    <div>
                        <label class="form-label small fw-bold">Giá hiển thị</label>
                        <div id="edit-price-display" class="fs-4 fw-bold text-accent">---</div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Hình ảnh bìa</h5>
                    <div class="text-center mb-3">
                        <div id="clickable-preview" class="rounded-4 bg-light d-flex align-items-center justify-content-center border-dashed position-relative overflow-hidden" style="height:280px; cursor:pointer;" onclick="document.getElementById('image-upload-input').click()">
                            <img id="book-preview-img" src="assets/images/product-item1.jpg" class="img-fluid rounded-4" style="max-height:260px;object-fit:contain; z-index:1;">
                            <div id="upload-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-none flex-column align-items-center justify-content-center rounded-4" style="background:rgba(255,255,255,0.8); z-index:10;">
                                <div class="spinner-border text-accent mb-2"></div>
                                <small class="fw-bold">Đang tải lên...</small>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="image-upload-input" class="d-none" accept="image/*" onchange="books.handleImageUpload(this)">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 rounded-start-pill"><i class="icon icon-image"></i></span>
                        <input type="text" name="anhBia" id="edit-anhBia" class="form-control rounded-end-pill small bg-light" 
                               placeholder="Tên file hệ thống..." readonly required>
                    </div>
                    <div class="mt-3">
                        <label class="form-label small fw-bold">Mô tả ảnh (Alt-text)</label>
                        <input type="text" name="coverAlt" id="edit-coverAlt" class="form-control rounded-pill small px-3" 
                               placeholder="VD: Mô tả nội dung ảnh bìa...">
                    </div>
                    <div id="file-info" class="mt-2 text-center d-none">
                        <small class="text-muted">Tên gốc: <span id="original-filename-info" class="fw-bold"></span></small>
                    </div>
                    <small class="text-muted mt-2 d-block text-center">Nhấp vào ảnh để thay đổi từ thiết bị</small>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
(function() {
    // Self-contained edit loader — does NOT override books.loadDetail
    async function loadBookForEdit(isbn) {
        try {
            // Updated to English endpoint
            const res = await api.get(`/books/${isbn}`);
            const b = res.data || res;

            // Store ISBN on button
            const btn = document.getElementById('btn-update-book');
            if (btn) btn.dataset.isbn = b.isbn;
            
            // Map English fields to form elements
            if (document.getElementById('edit-isbn-display')) document.getElementById('edit-isbn-display').value = b.isbn || isbn;
            if (document.getElementById('edit-tenSach')) document.getElementById('edit-tenSach').value = b.title || '';
            if (document.getElementById('edit-moTa')) document.getElementById('edit-moTa').value = b.description || '';
            if (document.getElementById('edit-trongLuong')) document.getElementById('edit-trongLuong').value = b.weight || '';
            if (document.getElementById('edit-namXuatBan')) document.getElementById('edit-namXuatBan').value = b.publishYear || '';
            if (document.getElementById('edit-giaNiemYet')) document.getElementById('edit-giaNiemYet').value = b.price || '';
            
            const priceDisplay = document.getElementById('edit-price-display');
            if (priceDisplay) priceDisplay.innerText = api.formatCurrency(b.price || 0);
            
            if (document.getElementById('edit-anhBia')) document.getElementById('edit-anhBia').value = b.coverImage || '';
            if (document.getElementById('edit-coverAlt')) document.getElementById('edit-coverAlt').value = b.coverAlt || '';
            
            const preview = document.getElementById('book-preview-img');
            if (preview && b.coverImage) preview.src = 'assets/images/' + b.coverImage;
            
            if (document.getElementById('edit-ngonNgu')) document.getElementById('edit-ngonNgu').value = b.language || 'Tiếng Việt';

            // After dropdowns are populated, select correct values using English structure
            setTimeout(() => {
                const catSel = document.getElementById('maDanhMuc');
                if (catSel && b.category) catSel.value = b.category.id || b.category.categoryId || '';
                
                const pubSel = document.getElementById('maNxb');
                if (pubSel && b.publisher) pubSel.value = b.publisher.id || b.publisher.publisherId || '';
                
                const authSel = document.getElementById('maTacGia');
                if (authSel && b.authors && b.authors.length > 0) authSel.value = b.authors[0].id || '';
            }, 800);
        } catch (e) {
            api.showToast('Không thể tải dữ liệu sách: ' + e.message, 'error');
        }
    }

    // Read ISBN from layout.current.id
    const isbn = (window.layout && window.layout.current) ? window.layout.current.id : null;
    if (isbn) {
        loadBookForEdit(isbn);
    }
})();
</script>

<style>
    .btn-accent { background-color: #C5A992; color: white; border: none; }
    .btn-accent:hover { background-color: #2F2F2F; }
</style>
