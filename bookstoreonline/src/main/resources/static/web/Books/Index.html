<!-- Books Area - Index View (Shop) -->
<section class="bg-light py-5">
    <div class="container-xl py-5">
        <!-- Header & Filter Bar -->
        <div class="row align-items-center mb-5">
            <div class="col-md-6" data-aos="fade-right">
                <h1 id="category-title" class="display-5 fw-bold font-serif m-0">Tất cả sản phẩm</h1>
                <p class="text-muted mt-2">Tìm thấy <span id="product-count" class="fw-bold text-accent">--</span> cuốn sách phù hợp</p>
            </div>
            <div class="col-md-6" data-aos="fade-left">
                <div class="d-flex justify-content-md-end gap-3 flex-wrap">
                    <select class="form-select border-0 shadow-sm rounded-pill px-4 py-2" id="books-sort-filter" style="width: 200px" onchange="books.handleSort(this.value)">
                        <option value="newest">Mới nhất</option>
                        <option value="price-asc">Giá tăng dần</option>
                        <option value="price-desc">Giá giảm dần</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row g-5">
            <!-- Left Sidebar (Categories) -->
            <div class="col-lg-3" data-aos="fade-up">
                <div class="sidebar sticky-top" style="top: 100px; z-index: 10">
                    <div class="card border-0 shadow-sm rounded-4 mb-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4 font-serif border-bottom pb-2">Danh mục</h5>
                            <ul class="list-unstyled d-grid gap-3" id="categories-filter-list">
                                <!-- Categories load dynamically via categories.js or books.js -->
                                 <li class="small text-muted text-center py-3"><div class="spinner-border spinner-border-sm"></div></li>
                            </ul>
                        </div>
                    </div>

                    <!-- Price Filter (Optional extension) -->
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-3 font-serif border-bottom pb-2">Khoảng giá</h5>
                            <div class="filter-price">
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="radio" name="price-range" id="price1" onclick="books.loadByPriceRange(0, 100000)">
                                    <label class="form-check-label small" for="price1">Dưới 100,000đ</label>
                                </div>
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="radio" name="price-range" id="price2" onclick="books.loadByPriceRange(100000, 300000)">
                                    <label class="form-check-label small" for="price2">100,000đ - 300,000đ</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="price-range" id="price3" onclick="books.loadByPriceRange(300000, 10000000)">
                                    <label class="form-check-label small" for="price3">Trên 300,000đ</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Content (Product Grid) -->
            <div class="col-lg-9" data-aos="fade-up" data-aos-delay="100">
                <div class="row g-4" id="books-grid">
                    <!-- Loaded via books.js -->
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-accent"></div>
                        <div class="mt-3 text-muted">Đang tải danh sách sách...</div>
                    </div>
                </div>

                <!-- Pagination -->
                <nav class="mt-5 pt-4">
                    <ul class="pagination justify-content-center border-0 gap-2" id="books-pagination">
                        <!-- Populated by JS -->
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</section>

<script>
    if (typeof AOS !== 'undefined') AOS.refresh();
</script>
