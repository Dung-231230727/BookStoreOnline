<!-- Books Area - Index View (Shop) -->
<section class="bg-light py-5">
    <div class="container-xl py-5">
        <!-- Header & Filter Bar -->
        <div class="row align-items-center mb-5">
            <div class="col-md-6" data-aos="fade-right">
                <h1 id="category-title" class="display-5 fw-bold font-serif m-0">Tất cả sản phẩm</h1>
                <p class="text-muted mt-2">Tìm thấy <span id="product-count" class="fw-bold text-accent">--</span> cuốn sách phù hợp</p>
            </div>
            <div class="col-md-6" data-aos="fade-left">
                <div class="d-flex justify-content-md-end gap-3 flex-wrap">
                    <select class="form-select border-0 shadow-sm rounded-pill px-4 py-2" style="width: 200px">
                        <option value="newest">Mới nhất</option>
                        <option value="price-asc">Giá tăng dần</option>
                        <option value="price-desc">Giá giảm dần</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row g-5">
            <!-- Left Sidebar (Categories) -->
            <div class="col-lg-3" data-aos="fade-up">
                <div class="sidebar sticky-top" style="top: 100px; z-index: 10">
                    <div class="card border-0 shadow-sm rounded-4 mb-4">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4 font-serif border-bottom pb-2">Danh mục</h5>
                            <ul class="list-unstyled d-grid gap-3" id="categories-filter-list">
                                <!-- Categories load dynamically -->
                                <li><a href="javascript:void(0)" class="text-decoration-none text-muted hvr-accent d-flex justify-content-between">Văn học</a></li>
                                <li><a href="javascript:void(0)" class="text-decoration-none text-muted hvr-accent d-flex justify-content-between">Kinh tế</a></li>
                                <li><a href="javascript:void(0)" class="text-decoration-none text-muted hvr-accent d-flex justify-content-between">Kỹ năng</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Content (Product Grid) -->
            <div class="col-lg-9" data-aos="fade-up" data-aos-delay="100">
                <div class="row g-4" id="books-grid">
                    <!-- Loaded via books.js -->
                    <div class="col-12 text-center py-5"><div class="spinner-border text-accent"></div></div>
                </div>

                <!-- Pagination -->
                <nav class="mt-5 pt-4">
                    <ul class="pagination justify-content-center border-0 gap-2">
                        <li class="page-item"><a class="page-link rounded-circle border-0 shadow-sm p-3 hvr-accent" href="#"><i class="icon icon-arrow-left"></i></a></li>
                        <li class="page-item active"><a class="page-link rounded-circle border-0 shadow-sm p-3 px-4" href="#">1</a></li>
                        <li class="page-item"><a class="page-link rounded-circle border-0 shadow-sm p-3 px-4" href="#">2</a></li>
                        <li class="page-item"><a class="page-link rounded-circle border-0 shadow-sm p-3 hvr-accent" href="#"><i class="icon icon-arrow-right"></i></a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</section>

<style>
    .pagination .page-link { color: var(--dark-color); }
    .pagination .page-item.active .page-link { background-color: var(--accent-color); border-color: var(--accent-color); color: white; }
    .sidebar .hvr-accent:hover span { color: var(--accent-color); }
</style>
