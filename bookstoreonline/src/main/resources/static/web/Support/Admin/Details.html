<div class="p-4 p-md-5 w-100">
    <main class="flex-grow-1 p-4 p-md-5">
        <!-- Breadcrumb & Header -->
        <div class="mb-5">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2">
                    <li class="breadcrumb-item small"><a href="javascript:void(0)"
                            onclick="layout.render('Dashboard/Admin', 'Index')"
                            class="text-decoration-none text-muted">Admin Hub</a></li>
                    <li class="breadcrumb-item small"><a href="javascript:void(0)"
                            onclick="layout.render('Support/Admin', 'Index')"
                            class="text-decoration-none text-muted">Support Tickets</a></li>
                    <li class="breadcrumb-item small active fw-bold text-accent">Ticket Details</li>
                </ol>
            </nav>
            <h2 class="fw-bold font-serif mb-0">Hỗ trợ khách hàng qua Chat</h2>
        </div>

        <div class="row">
            <!-- Main Chat Area -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white" style="height: 700px; display: flex; flex-direction: column;">
                    <!-- Chat Header -->
                    <div class="p-3 border-bottom bg-light d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-3">
                            <div class="bg-accent text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px; font-weight: bold;">
                                <span id="ticket-customer-initial">C</span>
                            </div>
                            <div>
                                <h5 class="mb-0 fw-bold" id="ticket-detail-title">Ticket Title</h5>
                                <div class="d-flex align-items-center gap-2">
                                    <span id="ticket-status-badge" class="badge rounded-pill" style="font-size: 0.7rem;">---</span>
                                    <small class="text-muted" id="ticket-detail-id">ID: #---</small>
                                </div>
                            </div>
                        </div>
                        <div class="text-end">
                            <small class="text-muted d-block">Khách hàng</small>
                            <strong id="ticket-customer-name">---</strong>
                        </div>
                    </div>

                    <!-- Chat Messages -->
                    <div id="admin-chat-box" class="flex-grow-1 p-4 overflow-auto bg-light d-flex flex-column gap-3">
                        <!-- Messages loaded here -->
                        <div class="text-center py-5 text-muted">
                            <div class="spinner-border spinner-border-sm mb-2"></div>
                            <p>Đang tải lịch sử hội thoại...</p>
                        </div>
                    </div>

                    <!-- Chat Input -->
                    <div class="p-3 border-top bg-white">
                        <div class="d-flex gap-2">
                            <div class="flex-grow-1 position-relative">
                                <textarea id="admin-reply" class="form-control border-0 bg-light rounded-4 p-3 shadow-none" 
                                          rows="2" placeholder="Nhập phản hồi cho khách hàng..." style="resize: none;"
                                          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault(); support.submitAdminChatMessage();}"></textarea>
                            </div>
                            <button onclick="support.submitAdminChatMessage()" class="btn btn-accent rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                                <i class="icon icon-paper-plane" style="font-size: 1.2rem;"></i>
                            </button>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-2 px-1">
                            <div class="d-flex gap-3">
                                <div class="form-check form-switch small">
                                    <input class="form-check-input" type="checkbox" id="change-status-check">
                                    <label class="form-check-label text-muted" for="change-status-check">Giải quyết & Đóng</label>
                                </div>
                            </div>
                            <small class="text-muted">Nhấn Enter để gửi</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar Info -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4 bg-white">
                    <h6 class="fw-bold mb-3">Thông tin hồ sơ</h6>
                    <div class="mb-3">
                        <label class="small text-muted fw-bold d-block">Trạng thái hiện tại</label>
                        <select class="form-select border-0 bg-light rounded-3 mt-1" id="target-status" onchange="support.updateTicketStatusFromSelect()">
                            <option value="OPEN">Mở (Open)</option>
                            <option value="PROCESSING">Đang xử lý (Processing)</option>
                            <option value="RESOLVED">Đã giải quyết (Resolved)</option>
                            <option value="CLOSED">Đóng (Closed)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="small text-muted fw-bold d-block">Ghi chú nội bộ</label>
                        <textarea class="form-control border-0 bg-light rounded-3 mt-1" id="internal-note" rows="3" placeholder="Ghi chú cho nội bộ team..."></textarea>
                        <button onclick="support.updateInternalNote()" class="btn btn-sm btn-light w-100 mt-2 rounded-pill">Lưu ghi chú</button>
                    </div>

                    <hr class="my-3 opacity-50">
                    
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="support.confirmDelete()">
                            <i class="icon icon-trash me-1"></i>Xóa yêu cầu
                        </button>
                        <button class="btn btn-light btn-sm rounded-pill" onclick="layout.render('Support/Admin', 'Index')">
                            <i class="icon icon-arrow-left me-1"></i>Quay lại danh sách
                        </button>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-4 bg-white">
                    <h6 class="fw-bold mb-3">Yêu cầu gốc</h6>
                    <div class="p-3 bg-light rounded-3 small text-muted" id="ticket-detail-content">
                        ---
                    </div>
                    <div class="mt-3 small">
                        <strong>Ngày tạo:</strong> <span id="ticket-created-date">---</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    (function () {
        const id = layout.current.id;
        if (id) {
            support.loadTicketDetails(id);
        }
    })();
</script>
