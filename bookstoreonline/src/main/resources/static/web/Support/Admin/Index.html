<div class="p-4 p-md-5 w-100">

    <main class="flex-grow-1 p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('Dashboard/Admin', 'Index')" class="text-decoration-none text-muted">Admin Hub</a></li>
                        <li class="breadcrumb-item small active fw-bold text-accent">Customer Support</li>
                    </ol>
                </nav>
                <h2 class="fw-bold font-serif mb-0">Support Tickets Management</h2>
                <small class="text-muted">Review and resolve customer inquiries and support requests</small>
            </div>
        </div>

        <!-- Filter & Search -->
        <div class="row mb-4 gap-3 bg-white p-3 rounded-4 shadow-sm mx-0">
            <div class="col-md-3">
                <input type="text" class="form-control rounded-3 border-0 bg-light" id="support-search" placeholder="Search by title or customer...">
            </div>
            <div class="col-md-2">
                <select class="form-select rounded-3 border-0 bg-light" id="support-status-filter">
                    <option value="">-- All Statuses --</option>
                    <option value="OPEN">Open</option>
                    <option value="PROCESSING">Processing</option>
                    <option value="CLOSED">Closed</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select rounded-3 border-0 bg-light" id="support-priority-filter">
                    <option value="">-- Priority Level --</option>
                    <option value="LOW">Low</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="HIGH">High</option>
                </select>
            </div>
            <div class="col-md-auto">
                <button class="btn btn-accent rounded-pill px-4 fw-bold" onclick="support.loadAdminTickets()">
                    <i class="icon icon-search me-2"></i>Filter Tickets
                </button>
            </div>
        </div>

        <!-- Tickets Table -->
        <div class="card border-0 shadow-sm rounded-5 overflow-hidden bg-white">
            <div class="table-responsive">
                <table class="table align-middle table-hover mb-0">
                    <thead class="bg-light text-muted extra-small text-uppercase fw-bold border-0">
                        <tr>
                            <th class="ps-4 py-3">ID</th>
                            <th class="py-3">Customer</th>
                            <th class="py-3">Subject / Title</th>
                            <th class="py-3">Current Status</th>
                            <th class="py-3">Priority</th>
                            <th class="py-3">Created Date</th>
                            <th class="text-end pe-4 py-3">Operations</th>
                        </tr>
                    </thead>
                    <tbody id="support-list-body">
                        <tr>
                            <td colspan="7" class="text-center py-5">
                                <div class="spinner-border text-accent spinner-border-sm" role="status"></div>
                                <span class="ms-2 text-muted">Syncing support registry...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<style>
    .extra-small { font-size: 0.7rem; letter-spacing: 0.05em; }
</style>
