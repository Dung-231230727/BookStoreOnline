<div class="support-page py-5">
    <div class="container">
        <div class="row mb-5">
            <div class="col-md-8">
                <h2 class="fw-bold mb-2">Hỗ trợ khách hàng</h2>
                <p class="text-muted">Theo dõi các yêu cầu hỗ trợ của bạn và nhận trợ giúp từ đội ngũ Booksaw</p>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-accent rounded-pill px-4" onclick="hoTro.openCreateForm()">
                    <i class="icon icon-plus me-2"></i>Gửi yêu cầu mới
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4 py-3 text-muted small text-uppercase fw-bold">Tiêu đề</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold">Ngày tạo</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold">Trạng thái</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="support-tickets-list" class="border-top-0">
                        <tr>
                            <td colspan="4" class="text-center py-5">
                                <div class="spinner-border text-accent spinner-border-sm" role="status"></div>
                                <span class="ms-2 text-muted">Đang tải...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal for creating/editing support tickets -->
<div class="modal fade" id="hoTro-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header border-0 bg-light rounded-top-4">
                <h5 class="modal-title fw-bold" id="hoTro-modal-title">Gửi yêu cầu hỗ trợ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="hoTro-form">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tiêu đề</label>
                        <input type="text" class="form-control rounded-pill" id="hoTro-title" placeholder="Ví dụ: Lỗi khi thanh toán" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Chi tiết vấn đề</label>
                        <textarea class="form-control rounded-4" id="hoTro-content" rows="5" placeholder="Mô tả chi tiết vấn đề..." required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 bg-light rounded-bottom-4">
                <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-accent rounded-pill px-4" id="btn-submit-hoTro">Gửi yêu cầu</button>
            </div>
        </div>
    </div>
</div>
