<div class="support-page py-5">
    <div class="container">
        <div class="row mb-5">
            <div class="col-md-8">
                <h2 class="fw-bold mb-2">Customer Support</h2>
                <p class="text-muted">Track your support requests and get help from the Booksaw team</p>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-accent rounded-pill px-4" onclick="support.loadAdminTickets()">
                    <i class="icon icon-plus me-2"></i>Create New Ticket
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4 py-3 text-muted small text-uppercase fw-bold">Title</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold">Created Date</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold">Status</th>
                            <th class="py-3 text-muted small text-uppercase fw-bold text-end pe-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="support-list-body" class="border-top-0">
                        <tr>
                            <td colspan="4" class="text-center py-5">
                                <div class="spinner-border text-accent spinner-border-sm" role="status"></div>
                                <span class="ms-2 text-muted">Loading...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal for creating/editing support tickets -->
<div class="modal fade" id="support-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header border-0 bg-light rounded-top-4">
                <h5 class="modal-title fw-bold" id="support-modal-title">Submit Support Ticket</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="support-form">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Title</label>
                        <input type="text" class="form-control rounded-pill" id="support-title" placeholder="e.g. Payment Error" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Details</label>
                        <textarea class="form-control rounded-4" id="support-content" rows="5" placeholder="Describe your issue..." required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 bg-light rounded-bottom-4">
                <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-accent rounded-pill px-4" id="btn-submit-support">Submit</button>
            </div>
        </div>
    </div>
</div>
